# Enchanter configuration.
# See https://agentskills.io for the full specification.
#
# Enchanter works with any OpenAI-compatible provider:
#   OpenAI, OpenRouter, Groq, Ollama, LM Studio, and more.
# Local providers (Ollama, LM Studio) typically don't need an API key.

model:
  # default: gpt-4.1-mini               # Model ID (override with ENCHANTER_MODEL env var)
  # base_url: https://api.openai.com/v1 # API base URL (override with ENCHANTER_BASE_URL)
  # api_key: your-key-here             # API key (override with ENCHANTER_API_KEY)
  #
  # Examples:
  #   OpenAI:      default: gpt-4.1-mini  api_key: sk-...
  #   OpenRouter:  base_url: https://openrouter.ai/api/v1  api_key: sk-or-...
  #   Ollama:      base_url: http://localhost:11434/v1  (no api_key needed)
  #   LM Studio:   base_url: http://localhost:1234/v1   (no api_key needed)

# Named providers — switch with /model <name> in the REPL.
# Each provider can set model, base_url, and api_key.
# Fields left blank inherit from the top-level model config or env vars.
#
# providers:
#   ollama:
#     model: qwen3
#     base_url: http://localhost:11434/v1
#   openrouter:
#     model: anthropic/claude-sonnet-4
#     base_url: https://openrouter.ai/api/v1
#     api_key: sk-or-...
#   groq:
#     model: llama-3.3-70b-versatile
#     base_url: https://api.groq.com/openai/v1
#     api_key: ${GROQ_API_KEY}

# Filesystem sandbox for the agent's file tools and shell execution.
# security:
#   # Directories the agent may read/write. Defaults to your home directory.
#   allowed_paths:
#     - ~/Projects
#     - /tmp
#   # On Linux, exec_command runs sh under a Landlock sandbox confined to the
#   # paths above (plus system dirs read-only). If the kernel can't enforce it
#   # (old kernel, non-Linux), exec_command refuses by default. Set this true to
#   # run the shell unsandboxed on such systems (escape hatch — use with care).
#   allow_unsandboxed_exec: false

agent:
  # max_turns: 30                       # Max agent loop turns (0 = unlimited)
  # summarize_on_exit: true             # Generate session summary on clean exit (default: true)
  # memory:
  #   max_entries: 50                   # Max memory entries loaded into prompt
  #   summarize_threshold: 40           # Summarize old entries when count exceeds this
  # context:                            # Rolling conversation context (long sessions)
  #   max_tokens: 96000                 # Compact older turns when the live window exceeds this (est. chars/4)
  #   keep_last_turns: 20               # Always keep this many most-recent messages verbatim

# MCP servers — extend Enchanter with external tool servers
# Tools from MCP servers are namespaced as server_name:tool_name
# Supports stdio (local process) and http (remote server) transports
# mcp:
#   servers:
#     filesystem:                                         # stdio transport
#       command: npx
#       args: ["-y", "@modelcontextprotocol/server-filesystem", "/home/user/Projects"]
#     fetch:
#       command: uvx
#       args: ["mcp-server-fetch"]
#     images:                                             # stdio with env vars
#       command: npx
#       args: ["-y", "@fal-serverless/mcp-server"]
#       env:
#         FAL_KEY: ${FAL_KEY}
#     my-remote:                                          # http transport
#       url: https://mcp.example.com/api
#       headers:
#         Authorization: "Bearer ${MY_TOKEN}"