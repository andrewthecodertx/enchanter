# Enchanter configuration.
# See https://agentskills.io for the full specification.
#
# Enchanter works with any OpenAI-compatible provider:
#   OpenAI, OpenRouter, Groq, Ollama, LM Studio, and more.
# Local providers (Ollama, LM Studio) typically don't need an API key.

model:
  # default: gpt-4.1-mini               # Model ID (override with ENCHANTER_MODEL env var)
  # base_url: https://api.openai.com/v1 # API base URL (override with ENCHANTER_BASE_URL)
  # api_key: your-key-here             # API key (override with ENCHANTER_API_KEY env var)
  #
  # Examples:
  #   OpenRouter:  base_url: https://openrouter.ai/api/v1
  #   Groq:        base_url: https://api.groq.com/openai/v1
  #   Ollama:      base_url: http://localhost:11434/v1   (no api_key needed)
  #   LM Studio:   base_url: http://localhost:1234/v1    (no api_key needed)

agent:
  # max_turns: 30                       # Max agent loop turns
  # memory:
  #   max_entries: 50                   # Max memory entries loaded into prompt
  #   summarize_threshold: 40           # Summarize old entries when count exceeds this

# MCP servers — extend Enchanter with external tool servers
# Tools from MCP servers are namespaced as server_name:tool_name
# Supports stdio (local process) and http (remote server) transports
# mcp:
#   servers:
#     filesystem:                                         # stdio transport
#       command: npx
#       args: ["-y", "@modelcontextprotocol/server-filesystem", "/home/user/Projects"]
#     fetch:
#       command: uvx
#       args: ["mcp-server-fetch"]
#     images:                                             # stdio with env vars
#       command: npx
#       args: ["-y", "@fal-serverless/mcp-server"]
#       env:
#         FAL_KEY: ${FAL_KEY}
#     my-remote:                                          # http transport
#       url: https://mcp.example.com/api
#       headers:
#         Authorization: "Bearer ${MY_TOKEN}"